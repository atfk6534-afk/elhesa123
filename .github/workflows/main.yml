name: Extract and Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract zip if present
        run: |
          ZIP=$(find . -maxdepth 2 -name "*.zip" | head -1)
          if [ -n "$ZIP" ]; then
            echo "Found zip: $ZIP"
            unzip -o "$ZIP" -d _tmp
            INNER=$(ls _tmp/)
            COUNT=$(ls _tmp/ | wc -l)
            if [ "$COUNT" -eq 1 ]; then
              cp -r _tmp/$INNER/. .
            else
              cp -r _tmp/. .
            fi
            rm -rf _tmp "$ZIP"
            echo "Extraction done"
          else
            echo "No zip found, using repo files directly"
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: attendance-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
